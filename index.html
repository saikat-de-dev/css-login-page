<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>CSS login page</title>
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="Untitled_design-removebg-preview.png" alt="Laundry">
        </div>
        <div class="right">
            <form action="#">
                <h1 class="heading">Welcome!</h1>
                <p class="centerP">We offer premium laundry services here!</p>
                <br>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="example123@email.com" required>
                <br>
                <label for="pass">Password</label>
                <input type="password" name="password" id="pass" placeholder="Password" required>
                <a href="#" class="fp">Forget password?</a>
                <br><br>
                <button>Login</button>
                <br><br>
                <p class="centerP">Not a member? <a href="#">Register Now</a></p>
            </form>
        </div>
    </div>
</body>
</html>
